<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photobooth Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel controls">
      <div class="panel-head">
        <h1>Photobooth Studio</h1>
        <p id="personLabel" class="muted"></p>
      </div>

      <div class="control-group">
        <p class="label">Template</p>
        <div id="templatePicker" class="template-picker"></div>
      </div>

      <div class="control-group auth-card">
        <p class="label">Account & Cloud</p>
        <input id="authName" type="text" placeholder="Full name (optional)" />
        <input id="authEmail" type="email" placeholder="Email address" autocomplete="email" />
        <input
          id="authPassword"
          type="password"
          placeholder="Password (min 8 chars)"
          autocomplete="current-password"
        />
        <input id="authTokenInput" type="text" placeholder="Paste verification/reset token" />
        <input
          id="newPasswordInput"
          type="password"
          placeholder="New password for reset"
          autocomplete="new-password"
        />
        <div class="auth-actions">
          <button id="signupBtn" type="button" class="ghost-btn">Create Account</button>
          <button id="loginBtn" type="button" class="primary-btn">Sign In</button>
          <button id="logoutBtn" type="button" class="ghost-btn">Sign Out</button>
          <button id="resendVerifyBtn" type="button" class="ghost-btn">Send Verify Link</button>
          <button id="requestResetBtn" type="button" class="ghost-btn">Send Reset Link</button>
          <button id="verifyTokenBtn" type="button" class="ghost-btn">Verify Token</button>
          <button id="resetPasswordBtn" type="button" class="ghost-btn">Reset Password</button>
        </div>
        <p id="authStatus" class="muted"></p>
      </div>

      <div class="control-group">
        <label class="label" for="captionInput">Caption</label>
        <input id="captionInput" type="text" placeholder="Photobooth" />
      </div>

      <div class="control-group">
        <p class="label">Add Photos</p>
        <label for="photoInput" class="dropzone">
          <span>Drop photos here or click to upload</span>
          <input id="photoInput" type="file" accept="image/*" multiple />
        </label>
        <p id="photoCount" class="muted">0 photos loaded</p>
      </div>

      <div class="control-group">
        <p class="label">Photo Library</p>
        <p class="hint">Drag a photo into any frame. Click a photo to auto-place it.</p>
        <div id="photoBank" class="photo-bank"></div>
      </div>

      <div class="actions">
        <button id="clearFramesBtn" type="button" class="ghost-btn">Clear Frames</button>
        <button id="exportBtn" type="button" class="primary-btn">Export PNG</button>
        <button id="saveProjectBtn" type="button" class="ghost-btn">Save Project</button>
        <button id="loadProjectBtn" type="button" class="ghost-btn">Load Project</button>
        <button id="shareBtn" type="button" class="primary-btn">Share PNG</button>
        <button id="saveCloudBtn" type="button" class="ghost-btn">Save Online</button>
        <button id="copyLinkBtn" type="button" class="primary-btn">Copy Share Link</button>
      </div>
      <div class="control-group">
        <p class="label">Your Saved Booths</p>
        <div class="cloud-actions">
          <select id="projectSelect" class="project-select">
            <option value="">Choose a saved booth</option>
          </select>
          <button id="loadCloudBtn" type="button" class="ghost-btn">Load</button>
        </div>
      </div>
      <input id="projectInput" type="file" accept="application/json,.json" hidden />
      <p id="statusMsg" class="muted status-msg" aria-live="polite"></p>
    </section>

    <section class="panel previewWrap">
      <div id="booth" class="booth strip">
        <div class="frame" data-frame="0"></div>
        <div class="frame" data-frame="1"></div>
        <div class="frame" data-frame="2"></div>
        <div class="frame" data-frame="3"></div>
        <div id="caption" class="caption">Photobooth</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
